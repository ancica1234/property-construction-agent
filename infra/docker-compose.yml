version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: pca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pca_user
      POSTGRES_PASSWORD: pca_pass
      POSTGRES_DB: pca_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pca_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
